version: 2

models:
  - name: dim_order_items
    description: "Cleaned order items data"
    columns:
      - name: order_id
        tests:
          - not_null
          

      - name: order_item_id
        tests:
          - not_null

      - name: product_id
        tests:
          - not_null

      - name: seller_id
        tests:
          - not_null
      
      - name: shipping_limit_ts
        tests:
          - not_null

      - name: price
        tests:
          - not_null

      - name: freight_value
        tests:
          - not_null