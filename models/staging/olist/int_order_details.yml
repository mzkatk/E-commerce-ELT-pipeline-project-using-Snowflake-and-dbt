version: 2

models:
  - name: int_order_details
    description: "Order item level details joined with orders and customers"
    columns:
      - name: order_item_key
        tests:
          - not_null
          - unique

      - name: order_id
        tests:
          - not_null

      - name: order_item_id
        tests:
          - not_null

      - name: customer_id
        tests:
          - not_null